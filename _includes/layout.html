    <script>
    (function () {
      var canvas = document.getElementById('bg-canvas');
      var ctx = canvas.getContext('2d');
      var DOT_COUNT = 300;
      var dots = [];

      // --- atmosphere / planet tunables ---
      var GLOW = '150,180,255';      // cool rim/nebula color (restrained)
      var HORIZON = 56;              // px of planet limb visible above page bottom
      var ATMO = 90;                 // atmosphere rim thickness in px
      var NEBULA_COUNT = 3;
      var METEOR_MIN = 15000;        // ms between meteors (min)
      var METEOR_MAX = 30000;        // ms between meteors (max)
      var PARALLAX = 0.015;          // cursor depth-parallax strength
      var TWINKLE = 0.35;            // star twinkle alpha depth (0 = none)

      // bake a soft radial blob into an offscreen canvas (gradient built once)
      function makeBlob(r, a) {
        var c = document.createElement('canvas');
        c.width = c.height = Math.ceil(r * 2);
        var x = c.getContext('2d');
        var g = x.createRadialGradient(r, r, 0, r, r, r);
        g.addColorStop(0, 'rgba(' + GLOW + ',' + a + ')');
        g.addColorStop(1, 'rgba(' + GLOW + ',0)');
        x.fillStyle = g;
        x.fillRect(0, 0, r * 2, r * 2);
        return c;
      }

      function dotColor() {
        return '#e9e9e9';
      }

      function randomAlpha() {
        return 0.12 + Math.random() * 0.16;
      }

      // returns [radiusMultiplier, depth] — depth: far .25 / mid .55 / near 1
      function sizeTier() {
        var t = Math.random();
        if (t < 0.60) return [1, 0.25];   // ~60% small / far
        if (t < 0.90) return [2, 0.55];   // ~30% mid
        return [4, 1.0];                  // ~10% big / near
      }

      function generateDots() {
        dots = [];
        var pageH = document.documentElement.scrollHeight;
        for (var i = 0; i < DOT_COUNT; i++) {
          var tier = sizeTier();
          dots.push({
            ox: Math.random() * canvas.width,
            oy: Math.random() * pageH,
            x: 0,
            y: 0,
            r: (0.8 + Math.random() * 1.2) * tier[0],
            depth: tier[1],
            big: tier[0] === 4,
            alpha: randomAlpha(),
            twPhase: Math.random() * Math.PI * 2,
            twSpeed: 0.5 + Math.random() * 1.5
          });
        }
        dots.forEach(function (d) { d.x = d.ox; d.y = d.oy; });
      }

      // --- nebula: slow-drifting viewport-fixed soft blobs ---
      var nebula = [];
      function generateNebula() {
        nebula = [];
        for (var i = 0; i < NEBULA_COUNT; i++) {
          var r = 220 + Math.random() * 260;
          nebula.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height * 0.7,
            r: r,
            vx: (Math.random() - 0.5) * 0.06,
            vy: (Math.random() - 0.5) * 0.04,
            spr: makeBlob(r, 0.045)
          });
        }
      }

      function drawNebula() {
        for (var i = 0; i < nebula.length; i++) {
          var n = nebula[i];
          ctx.drawImage(n.spr, n.x - n.r, n.y - n.r);
        }
      }

      // --- planet limb + atmosphere, baked into an offscreen sprite ---
      // Only the ~(HORIZON+ATMO) px cap is ever visible, so we render that band
      // once (gradients are static for a given width) and blit it each frame
      // with its bottom edge aligned to the page-space bottom.
      var planetSpr = null, planetW = 0, planetH = 0;

      function buildPlanet() {
        var w = canvas.width;
        var R = Math.max(w * 0.9, 700);
        var cx = w * 0.5;
        planetH = HORIZON + ATMO + 24;     // visible cap + a little headroom
        var c = document.createElement('canvas');
        c.width = w;
        c.height = planetH;
        var x = c.getContext('2d');
        var cy = planetH + R - HORIZON;    // sprite bottom edge == page bottom

        // atmosphere rim — radial glow peaking at the limb, occluded by body
        var ag = x.createRadialGradient(cx, cy, R, cx, cy, R + ATMO);
        ag.addColorStop(0, 'rgba(' + GLOW + ',0.16)');
        ag.addColorStop(0.5, 'rgba(' + GLOW + ',0.06)');
        ag.addColorStop(1, 'rgba(' + GLOW + ',0)');
        x.fillStyle = ag;
        x.fillRect(0, planetH - HORIZON - ATMO, w, ATMO + HORIZON + 1);

        // planet body — near-black with an upper-left terminator brightening
        var bg = x.createRadialGradient(
          cx - R * 0.4, cy - R * 0.5, R * 0.2,
          cx, cy, R
        );
        bg.addColorStop(0, 'rgba(70,80,105,1)');
        bg.addColorStop(0.18, 'rgba(34,38,52,1)');
        bg.addColorStop(0.5, '#1b1c22');
        bg.addColorStop(1, '#141414');
        x.fillStyle = bg;
        x.beginPath();
        x.arc(cx, cy, R, 0, Math.PI * 2);
        x.fill();

        planetSpr = c;
        planetW = w;
      }

      function drawPlanet(bottomY) {
        if (!planetSpr || planetW !== canvas.width) buildPlanet();
        ctx.drawImage(planetSpr, 0, bottomY - planetH);
      }

      var lastResizeWidth = 0;
      var pageH = 0;
      var frameNo = 0;

      function resize() {
        var w = window.innerWidth;
        canvas.width = w;
        canvas.height = window.innerHeight;
        pageH = document.documentElement.scrollHeight;
        generateNebula();
        if (w !== lastResizeWidth) {
          lastResizeWidth = w;
          generateDots();
        }
      }

      var mouse = { x: -9999, y: -9999 };
      var prevMouse = { x: -9999, y: -9999 };
      var vx = 0;
      var vy = 0;
      var momentum = 0;
      var MOMENTUM_RISE = 0.12;
      var MOMENTUM_DECAY = 0.96;

      function updateMomentum() {
        vx = mouse.x - prevMouse.x;
        vy = mouse.y - prevMouse.y;
        var speed = Math.sqrt(vx * vx + vy * vy);
        if (speed > 1) {
          momentum = Math.min(1, momentum + MOMENTUM_RISE * Math.min(speed / 15, 1));
        } else {
          momentum *= MOMENTUM_DECAY;
        }
        prevMouse.x = mouse.x;
        prevMouse.y = mouse.y;
      }

      window.addEventListener('mousemove', function (e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      var INFLUENCE = 180;
      var MAX_DISP = 12;

      // --- occasional meteor streak ---
      var meteor = null;
      var nextMeteor = METEOR_MIN + Math.random() * (METEOR_MAX - METEOR_MIN);
      var lastTs = 0;

      function spawnMeteor() {
        var w = canvas.width, h = canvas.height;
        var ang = (Math.PI / 4) + (Math.random() - 0.5) * 0.5; // down-right-ish
        var len = 160 + Math.random() * 120;
        meteor = {
          x: Math.random() * w * 0.7,
          y: Math.random() * h * 0.35,
          dx: Math.cos(ang), dy: Math.sin(ang),
          len: len, life: 0, dur: 800,
          speed: (w + h) * 0.0009
        };
      }

      function drawMeteor(dt) {
        if (!meteor) return;
        meteor.life += dt;
        meteor.x += meteor.dx * meteor.speed * dt;
        meteor.y += meteor.dy * meteor.speed * dt;
        var p = meteor.life / meteor.dur;
        if (p >= 1) { meteor = null; return; }
        var fade = Math.sin(p * Math.PI);           // ease in/out
        var tx = meteor.x - meteor.dx * meteor.len;
        var ty = meteor.y - meteor.dy * meteor.len;
        var mg = ctx.createLinearGradient(meteor.x, meteor.y, tx, ty);
        mg.addColorStop(0, 'rgba(' + GLOW + ',' + (0.7 * fade) + ')');
        mg.addColorStop(1, 'rgba(' + GLOW + ',0)');
        ctx.strokeStyle = mg;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(meteor.x, meteor.y);
        ctx.lineTo(tx, ty);
        ctx.stroke();
      }

      function draw(ts) {
        var dt = lastTs ? Math.min(ts - lastTs, 60) : 16;
        lastTs = ts;

        // page height grows as lazy images load — refresh occasionally, not
        // every frame (scrollHeight forces a reflow)
        if ((frameNo++ % 20) === 0) {
          pageH = document.documentElement.scrollHeight;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updateMomentum();

        // drift nebula (viewport-fixed backdrop)
        for (var k = 0; k < nebula.length; k++) {
          var n = nebula[k];
          n.x += n.vx; n.y += n.vy;
          if (n.x < -n.r) n.x = canvas.width + n.r;
          if (n.x > canvas.width + n.r) n.x = -n.r;
          if (n.y < -n.r) n.y = canvas.height + n.r;
          if (n.y > canvas.height + n.r) n.y = -n.r;
        }
        drawNebula();

        var scrollY = window.scrollY;
        var docMouseX = mouse.x + window.scrollX;
        var docMouseY = mouse.y + scrollY;
        var now = Date.now() * 0.003;
        var pmx = mouse.x > -9000 ? (mouse.x - canvas.width / 2) : 0;
        ctx.fillStyle = dotColor();

        ctx.save();
        ctx.translate(0, -scrollY);

        for (var i = 0; i < dots.length; i++) {
          var d = dots[i];

          if (d.oy < scrollY - 20 || d.oy > scrollY + canvas.height + 20) {
            d.x += (d.ox - d.x) * 0.08;
            d.y += (d.oy - d.y) * 0.08;
            continue;
          }

          var dx = d.ox - docMouseX;
          var dy = d.oy - docMouseY;
          var dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < INFLUENCE && dist > 0 && momentum > 0.01) {
            var falloff = (1 - dist / INFLUENCE);
            falloff = falloff * falloff;
            var wave = Math.sin(dist * 0.05 - now) * 0.4 + 0.6;
            var force = falloff * momentum * MAX_DISP * wave * d.depth;
            var nx = dx / dist;
            var ny = dy / dist;
            d.x += (d.ox + nx * force - d.x) * 0.14;
            d.y += (d.oy + ny * force - d.y) * 0.14;
          } else {
            d.x += (d.ox - d.x) * 0.08;
            d.y += (d.oy - d.y) * 0.08;
          }

          // subtle depth parallax follows the cursor (no scroll-pop)
          var px = pmx * PARALLAX * (d.depth - 0.35);
          var tw = d.big ? 1 : (1 - TWINKLE) + TWINKLE * Math.sin(now * d.twSpeed + d.twPhase);

          ctx.beginPath();
          ctx.arc(d.x + px, d.y, d.r, 0, Math.PI * 2);
          ctx.globalAlpha = d.alpha * tw;
          ctx.fill();
        }

        ctx.restore();
        ctx.globalAlpha = 1;

        // meteor lives in the sky, behind the atmosphere/planet
        nextMeteor -= dt;
        if (!meteor && nextMeteor <= 0) {
          spawnMeteor();
          nextMeteor = METEOR_MIN + Math.random() * (METEOR_MAX - METEOR_MIN);
        }
        drawMeteor(dt);

        // planet sits at the very bottom of the page — scroll down to reach it
        ctx.save();
        ctx.translate(0, -scrollY);
        drawPlanet(pageH);
        ctx.restore();
        requestAnimationFrame(draw);
      }

      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        generateNebula();
        drawNebula();
        for (var s = 0; s < DOT_COUNT; s++) {
          ctx.beginPath();
          ctx.arc(
            Math.random() * canvas.width,
            Math.random() * canvas.height,
            (0.8 + Math.random() * 1.2) * sizeTier()[0],
            0, Math.PI * 2
          );
          ctx.fillStyle = '#e9e9e9';
          ctx.globalAlpha = 0.12 + Math.random() * 0.16;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        drawPlanet(canvas.height);
      } else {
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(draw);
      }
    })();
    </script>
  </body>
